<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ranking GR - Equipe Chis</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:#fff;
}

.container {
  padding:20px;
}

h1 {
  text-align:center;
  color:#d4af37;
}

.subtitle {
  text-align:center;
  color:#aaa;
}

.sync {
  text-align:center;
  margin:10px;
  font-size:12px;
}

.ok { color:#22c55e }
.err { color:#ef4444 }

.card {
  background:#111827;
  border-radius:10px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th {
  background:#000;
  color:#d4af37;
  padding:10px;
}

td {
  padding:10px;
  text-align:center;
  border-bottom:1px solid #222;
}

input {
  width:60px;
  background:#000;
  color:#fff;
  border:1px solid #333;
}

.rank1 td:first-child::before { content:"🥇 "; }
.rank2 td:first-child::before { content:"🥈 "; }
.rank3 td:first-child::before { content:"🥉 "; }

.total {
  color:#d4af37;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>🏆 Ranking GR</h1>
<div class="subtitle" id="mes"></div>
<div class="sync" id="status">Carregando...</div>

<div class="card">
  <div id="tabela"></div>
</div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const EQUIPE = "equipe_chis";

const firebaseConfig = {
  apiKey: "AIzaSyAStKygESgvDlcqL8AcPd2K6cQLDS4IpuQ",
  authDomain: "ranking-chis.firebaseapp.com",
  databaseURL: "https://ranking-chis-default-rtdb.firebaseio.com",
  projectId: "ranking-chis",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, EQUIPE);

let config = { mes:"Meta mensal", semanas:4, vendedores:["V1","V2","V3"] };
let dados = [];

function render(){
  document.getElementById("mes").innerText = config.mes;

  const sorted = [...dados].sort((a,b)=> soma(b)-soma(a));

  let html = "<table><thead><tr><th>Vendedor</th>";

  for(let i=0;i<config.semanas;i++) html += `<th>S${i+1}</th>`;

  html += "<th>Total</th></tr></thead><tbody>";

  sorted.forEach((v,i)=>{
    const total = soma(v);
    const cls = i==0?"rank1":i==1?"rank2":i==2?"rank3":"";

    html += `<tr class="${cls}"><td>${v.nome}</td>`;

    for(let s=0;s<config.semanas;s++){
      html += `<td><input type="number" value="${v.s[s]||0}" data-nome="${v.nome}" data-s="${s}"/></td>`;
    }

    html += `<td class="total">${total}</td></tr>`;
  });

  html += "</tbody></table>";

  document.getElementById("tabela").innerHTML = html;

  document.querySelectorAll("input").forEach(inp=>{
    inp.onchange = e=>{
      const nome = e.target.dataset.nome;
      const s = e.target.dataset.s;
      const v = dados.find(x=>x.nome==nome);
      v.s[s] = parseInt(e.target.value)||0;

      set(ref(db, `${EQUIPE}/dados/${nome}/s`), v.s);
      render();
    };
  });
}

function soma(v){ return v.s.reduce((a,b)=>a+b,0); }

onValue(dbRef, snap=>{
  const val = snap.val();

  if(val){
    config = val.config || config;
    dados = Object.values(val.dados || {});
  }else{
    dados = config.vendedores.map(n=>({nome:n, s:Array(config.semanas).fill(0)}));

    const obj = Object.fromEntries(dados.map(d=>[d.nome,d]));
    set(dbRef,{config,dados:obj});
  }

  render();
  document.getElementById("status").innerText = "● ONLINE";
  document.getElementById("status").className = "sync ok";
});

</script>

</body>
</html>
